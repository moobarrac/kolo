name: Daily job

# Writes the net-worth snapshot and runs the notification producers (§12). The
# daily write also keeps the free Supabase project from pausing after 7 days idle.
on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC every day
  workflow_dispatch: # allow manual runs from the Actions tab

concurrency:
  group: daily-job
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run daily job
        run: npm run job:daily --workspace backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
